<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memefyer - AI Meme Analyzer</title>
    <meta name="description" content="AI powered multimodal meme analyzer using CLIP.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --primary: #8b5cf6;
            --primary-hover: #7c3aed;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,0.3) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,0.3) 0, transparent 50%);
            background-size: cover;
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .container {
            width: 100%;
            max-width: 900px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 3rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            grid-column: 1 / -1;
            text-align: center;
            margin-bottom: 1rem;
        }

        .header h1 {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #c084fc, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .upload-section {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .drop-zone {
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            padding: 2rem;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            background: rgba(0,0,0,0.2);
            height: 250px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .drop-zone:hover {
            border-color: var(--primary);
            background: rgba(139, 92, 246, 0.1);
        }

        .drop-zone img#preview {
            max-width: 100%;
            max-height: 100%;
            display: none;
            border-radius: 8px;
            object-fit: contain;
        }

        .drop-zone span {
            color: var(--text-muted);
            font-weight: 600;
        }

        input[type="file"] {
            display: none;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-weight: 600;
            color: var(--text-main);
            font-size: 0.9rem;
        }

        input[type="text"] {
            width: 100%;
            padding: 1rem;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.3);
            color: white;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.2);
        }

        button {
            background: linear-gradient(135deg, var(--primary), #ec4899);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 15px -3px rgba(139, 92, 246, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 20px -3px rgba(139, 92, 246, 0.4);
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .results-section {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 16px;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .result-item {
            margin-bottom: 1.5rem;
        }

        .result-item:last-child {
            margin-bottom: 0;
        }

        .result-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            font-weight: 600;
            text-transform: capitalize;
        }

        .progress-bar {
            width: 100%;
            height: 12px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            border-radius: 6px;
            width: 0%;
            transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .humour .progress-fill { background: linear-gradient(90deg, #f59e0b, #fbbf24); }
        .sarcasm .progress-fill { background: linear-gradient(90deg, #3b82f6, #60a5fa); }
        .offensive .progress-fill { background: linear-gradient(90deg, #ef4444, #f87171); }
        .motivational .progress-fill { background: linear-gradient(90deg, #10b981, #34d399); }

        .loading-spinner {
            display: none;
            border: 4px solid rgba(255,255,255,0.1);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
                padding: 2rem;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>Memefyer</h1>
            <p>Upload a meme and enter its text to analyze its properties using AI.</p>
        </div>

        <div class="upload-section">
            <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
                <span id="drop-text">Drag & Drop Meme Image Here<br>or Click to Browse</span>
                <img id="preview" alt="Image preview">
            </div>
            <input type="file" id="file-input" accept="image/*">

            <div class="input-group">
                <label for="meme-text">Meme Text (OCR / Manual)</label>
                <input type="text" id="meme-text" placeholder="Enter the text seen in the meme...">
            </div>

            <button id="analyze-btn" onclick="analyzeMeme()">
                <span id="btn-text">Analyze Meme</span>
                <div class="loading-spinner" id="spinner"></div>
            </button>
        </div>

        <div class="results-section">
            <div id="results-content">
                <div class="empty-state">
                    Results will appear here after analysis.
                </div>
            </div>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('file-input');
        const preview = document.getElementById('preview');
        const dropText = document.getElementById('drop-text');
        const dropZone = document.getElementById('drop-zone');

        // Drag and Drop functionality
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.style.borderColor = 'var(--primary)';
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.style.borderColor = 'rgba(255, 255, 255, 0.2)';
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.style.borderColor = 'rgba(255, 255, 255, 0.2)';
            if (e.dataTransfer.files.length > 0) {
                fileInput.files = e.dataTransfer.files;
                updatePreview();
            }
        });

        fileInput.addEventListener('change', updatePreview);

        function updatePreview() {
            const file = fileInput.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                    dropText.style.display = 'none';
                };
                reader.readAsDataURL(file);
            }
        }

        async function analyzeMeme() {
            const file = fileInput.files[0];
            const text = document.getElementById('meme-text').value;

            if (!file || !text.trim()) {
                alert("Please provide both an image and text for analysis.");
                return;
            }

            const btnText = document.getElementById('btn-text');
            const spinner = document.getElementById('spinner');
            const btn = document.getElementById('analyze-btn');

            btn.disabled = true;
            btnText.style.display = 'none';
            spinner.style.display = 'block';

            const formData = new FormData();
            formData.append('image', file);
            formData.append('text', text);

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    body: formData
                });
                
                const results = await response.json();
                displayResults(results);
            } catch (error) {
                console.error('Error:', error);
                alert('An error occurred during analysis.');
            } finally {
                btn.disabled = false;
                btnText.style.display = 'block';
                spinner.style.display = 'none';
            }
        }

        function displayResults(data) {
            const container = document.getElementById('results-content');
            container.innerHTML = '';

            for (const [label, prob] of Object.entries(data)) {
                const percentage = Math.round(prob * 100);
                
                const item = document.createElement('div');
                item.className = `result-item ${label}`;
                
                item.innerHTML = `
                    <div class="result-label">
                        <span>${label}</span>
                        <span>${percentage}%</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: 0%"></div>
                    </div>
                `;
                
                container.appendChild(item);
                
                setTimeout(() => {
                    item.querySelector('.progress-fill').style.width = `${percentage}%`;
                }, 50);
            }
        }
    </script>
</body>
</html>
